<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}"></title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="container">
    <h1 th:text="${pageTitle}"></h1>
    <form th:object="${item}" th:action="${action}" method="post">
        <div class="form-group">
            <label for="title">Título:</label>
            <input type="text" id="title" th:field="*{title}" required>
        </div>
        <div class="form-group">
            <label for="description">Descripción:</label>
            <input type="text" id="description" th:field="*{description}" required>
        </div>
        <div class="form-group">
            <label for="category">Categoría:</label>
            <input type="text" id="category" th:field="*{category}" required>
        </div>
        <div class="form-group">
            <label for="manufacturer">Fabricante:</label>
            <input type="text" id="manufacturer" th:field="*{manufacturer}" required>
        </div>
        <div class="form-group">
            <label for="count">Cantidad:</label>
            <input type="number" id="count" th:field="*{count}" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="/items/" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
