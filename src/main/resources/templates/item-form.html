<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}"></title>
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        async function generateDescription() {
            const promptInput = document.getElementById('ai-prompt');
            const descriptionArea = document.getElementById('description');
            const generateBtn = document.getElementById('ai-btn');
            const prompt = promptInput.value;

            if (!prompt) {
                alert('Por favor, escribe una instrucción para la IA.');
                return;
            }

            generateBtn.disabled = true;
            generateBtn.textContent = 'Generando...';

            try {
                const response = await fetch(`/generate-description?prompt=${encodeURIComponent(prompt)}`);
                if (response.ok) {
                    const text = await response.text();
                    descriptionArea.value = text;
                } else {
                    alert('Error al generar la descripción.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Ocurrió un error al contactar con la IA.');
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generar Descripción con IA';
            }
        }
    </script>
</head>
<body>
<div class="container">
    <h1 th:text="${pageTitle}"></h1>
    <form th:object="${item}" th:action="@{'/items/' + ${action}}" method="post">
        <div class="form-group">
            <label for="title">Título:</label>
            <input type="text" id="title" th:field="*{title}" required>
        </div>

        <!-- Sección de IA -->
        <div class="form-group" style="background-color: #e9ecef; padding: 15px; border-radius: 5px; margin-bottom: 15px;">
            <label for="ai-prompt">Asistente de IA (opcional):</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="ai-prompt" placeholder="Ej: Describe una silla ergonómica de oficina..." style="flex-grow: 1;">
                <button type="button" id="ai-btn" onclick="generateDescription()" class="btn btn-info" style="margin: 0;">Generar Descripción con IA</button>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Descripción:</label>
            <!-- Cambiado a textarea para mejor visualización de textos largos -->
            <textarea id="description" th:field="*{description}" rows="4" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required></textarea>
        </div>
        <div class="form-group">
            <label for="category">Categoría:</label>
            <input type="text" id="category" th:field="*{category}" required>
        </div>
        <div class="form-group">
            <label for="manufacturer">Fabricante:</label>
            <input type="text" id="manufacturer" th:field="*{manufacturer}" required>
        </div>
        <div class="form-group">
            <label for="count">Cantidad:</label>
            <input type="number" id="count" th:field="*{count}" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/items}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
